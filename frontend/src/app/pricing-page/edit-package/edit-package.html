
<div 
    class="modal fade" 
    tabindex="-1" 
    [id]="`editPackageModal${existingPackage()?.id ?? -1}`"
    [attr.aria-labelledby]="`edit-package-modal-label-${existingPackage()?.id ?? -1}`" 
    aria-hidden="true"
>
    <div class="modal-dialog">
        <div class="modal-content">
            <h4 class="modal-header"><b>Editar paquete {{existingPackage()?.planName ?? ''}}</b></h4>
            <div class="modal-body">
                <form>
                    <div class="input-group input-group-sm mb-3">
                        <span class="input-group-text" [attr.id]="'basic-label-name'">Nombre del paquete</span>                            
                        <input [formField]="packageForm.planName" type="text" class="form-control" placeholder="Enter package name">
                    </div>

                    <div class="input-group input-group-sm mb-3">
                        <span class="input-group-text" [attr.id]="'basic-label-total-price'">Precio total ($)</span>                            
                        <input 
                            [formField]="packageForm.totalPrice"
                            type="number" 
                            class="form-control" 
                            id="inputTotalPrice" 
                            aria-describedby="totalPriceHelp" 
                            placeholder="Enter total price"
                        >

                        <span class="input-group-text" [attr.id]="'basic-label-duration'">Duración (meses)</span>                            
                        <input 
                            [formField]="packageForm.duration" 
                            type="number" 
                            class="form-control" 
                            id="inputDuration" 
                            aria-describedby="durationHelp" 
                            placeholder="Enter package duration"
                        >
                    </div>

                    <div class="input-group input-group-sm mb-3">
                        <span class="input-group-text" [attr.id]="'basic-label-monthly-price'">Precio mensual</span>
                        <span class="input-group-text" [attr.id]="'monthly-price'">{{monthlyPrice() | currency}}</span>
                    </div>
                </form>
            </div>

            <div class="modal-footer">
                <button type="button" class="btn btn-sm btn-outline-secondary" data-bs-dismiss="modal">Cerrar</button>
                <button (click)="editPackage()" data-bs-dismiss="modal" class="btn btn-sm btn-outline-success">Agregar paquete</button>
            </div>
        </div>
    </div>
</div>

<div 
    class="modal modal-sm fade" 
    [id]="modalId()"
    tabindex="-1"     
    aria-labelledby='remove-student-modal-label' 
    aria-hidden="true"
>
    <div class="modal-dialog">
        <div class="modal-content">
            <h4 class="modal-header"><b>Eliminar alumno</b></h4>
            <div class="modal-body mb-0 py-0">
                <p>¿Está seguro de que desea eliminar a {{`${student().firstName} ${student().lastName}`}}?</p>
                <p style="font-size: small; color: #dc3545">Esta acción no se puede deshacer.</p>
            </div>
            <div class="modal-footer">
                    <button type="button" class="btn btn-sm btn-secondary" data-bs-dismiss="modal">Cerrar</button>
                    <button (click)="removeStudent(student().id)" data-bs-dismiss="modal" class="btn btn-sm btn-danger">Eliminar alumno</button>
                </div>
            </div>
    </div>
</div>
